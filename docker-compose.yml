services:
  demo-controller:
    container_name: controller
    build: .
    environment:
      CONTAINERS: "r1 r2"
      USE_STARTUPDB: "yes"
    ports:
      - "8082:80"
    depends_on:
      - r1
      - r2
    volumes:
      - ./script/prepare-ssh.sh:/prepare-ssh.sh:ro
      - ./configuration/startup_db:/usr/local/var/controller/startup_db:ro
      - ./storage:/usr/local/var/gateway/configs
    entrypoint: ["/bin/bash", "/prepare-ssh.sh"]

  r1:
    container_name: r1
    image: clixon/openconfig:latest

  r2:
    container_name: r2
    image: clixon/openconfig:latest
